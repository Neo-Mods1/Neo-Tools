name: Debug Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Cache Android SDK components
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.ANDROID_HOME }}/ndk
          ${{ env.ANDROID_HOME }}/build-tools
          ${{ env.ANDROID_HOME }}/platforms
        key: android-sdk-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
        restore-keys: |
          android-sdk-${{ runner.os }}-

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK 27 and CMake
      run: yes | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

    - name: Cache Gradle build directory
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK (arm64 only)
      id: build
      continue-on-error: true
      run: |
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log
        echo "build_status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

    - name: Check build result
      id: check
      run: |
        if [ "${{ steps.build.outputs.build_status }}" = "0" ]; then
          echo "success=true" >> $GITHUB_OUTPUT
        else
          echo "success=false" >> $GITHUB_OUTPUT
        fi

    - name: Send success to Telegram
      if: steps.check.outputs.success == 'true'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
        APK_SIZE=$(du -h "$APK_FILE" | cut -f1)
        COMMIT_MSG=$(echo "${{ github.event.head_commit.message || github.event.pull_request.title || 'N/A' }}" | head -1)

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="✅ NEO TOOLS DEBUG BUILD%0ASize: ${APK_SIZE}%0ACommit: ${COMMIT_MSG}"

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
          -F chat_id="${TELEGRAM_CHAT_ID}" \
          -F document=@"${APK_FILE}" \
          -F caption="Neo Tools debug"

    - name: Send failure to Telegram
      if: steps.check.outputs.success == 'false'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        COMMIT_MSG=$(echo "${{ github.event.head_commit.message || github.event.pull_request.title || 'N/A' }}" | head -1)

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="❌ NEO TOOLS DEBUG FAILED%0ACommit: ${COMMIT_MSG}%0ALogs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
          -F chat_id="${TELEGRAM_CHAT_ID}" \
          -F document=@build_output.log \
          -F caption="Build log"
