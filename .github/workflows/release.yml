name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Cache Android SDK components
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.ANDROID_HOME }}/ndk
          ${{ env.ANDROID_HOME }}/build-tools
          ${{ env.ANDROID_HOME }}/platforms
        key: android-sdk-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
        restore-keys: |
          android-sdk-${{ runner.os }}-

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK 27 and CMake
      run: yes | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

    - name: Cache Gradle build directory
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APKs (all ABIs)
      id: build
      continue-on-error: true
      run: |
        ./gradlew assembleRelease --stacktrace 2>&1 | tee build_output.log
        echo "build_status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

    - name: Check build result
      id: check
      run: |
        if [ "${{ steps.build.outputs.build_status }}" = "0" ]; then
          echo "success=true" >> $GITHUB_OUTPUT
        else
          echo "success=false" >> $GITHUB_OUTPUT
        fi

    - name: Release failed -> send log + error to admin only
      if: steps.check.outputs.success == 'false'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        COMMIT_MSG=$(git log -1 --pretty=%s)

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="❌ NEO TOOLS RELEASE FAILED%0ACommit: ${COMMIT_MSG}"

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
          -F chat_id="${TELEGRAM_CHAT_ID}" \
          -F document=@build_output.log \
          -F caption="Build log"

    - name: Release succeeded -> send to admin, then broadcast to all chats
      if: steps.check.outputs.success == 'true'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BROADCAST_CHAT_IDS: ${{ secrets.TELEGRAM_BROADCAST_CHAT_IDS }}
      run: |
        BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
        COMMIT_MSG=$(git log -1 --pretty=%s)

        # 1. Send the release to the admin ("me") first.
        for APK in app/build/outputs/apk/release/*.apk; do
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document=@"${APK}" \
            -F caption="Neo Tools Release - $(basename "${APK}")"
        done

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="✅ NEO TOOLS RELEASE BUILD READY%0ATime: ${BUILD_TIME}%0ACommit: ${COMMIT_MSG}%0A%0ABroadcasting to all chats..."

        # 2. Discover every chat the bot has talked to via the Telegram API.
        #    (getUpdates enumerates recent chats; optional explicit list is appended.)
        CHATS=""
        if [ -n "${TELEGRAM_BROADCAST_CHAT_IDS}" ]; then
          CHATS="${TELEGRAM_BROADCAST_CHAT_IDS}"
        fi
        DISCOVERED=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?limit=100" \
          | jq -r '.result[].message.chat.id' 2>/dev/null | sort -u)
        for c in ${DISCOVERED}; do
          case " ${CHATS} " in
            *" ${c} "*) ;;
            *) CHATS="${CHATS} ${c}" ;;
          esac
        done

        # 3. Forward the release to every other chat ("What's new: <commit>").
        for c in ${CHATS}; do
          [ -z "${c}" ] && continue
          [ "${c}" = "${TELEGRAM_CHAT_ID}" ] && continue
          for APK in app/build/outputs/apk/release/*.apk; do
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${c}" \
              -F document=@"${APK}" \
              -F caption="What's new: ${COMMIT_MSG}"
          done
        done
